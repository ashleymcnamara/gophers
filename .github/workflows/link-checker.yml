name: Link Checker

on:
  schedule:
    - cron: '0 9 * * 1'
  pull_request:
    paths:
      - '**.md'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  link-checker:
    name: Check links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run lychee link checker
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --accept 200,204,206,429
            --timeout 30
            --max-retries 3
            README.md
          fail: false

      - name: Create issue for broken links (scheduled only)
        if: >-
          steps.lychee.outputs.exit_code != '0' &&
          github.event_name == 'schedule'
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: 'Broken links detected in markdown files'
          content-filepath: ./lychee/out.md
          labels: bug,documentation

      - name: Fail on broken links (PR only)
        if: >-
          steps.lychee.outputs.exit_code != '0' &&
          github.event_name == 'pull_request'
        run: exit 1
